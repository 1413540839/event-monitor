name: Event Contract Monitor v22

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests numpy pandas pandas_ta_classic
      - name: Configure Git
        run: |
          git config user.name "EventMonitorBot"
          git config user.email "bot@event-monitor.dev"
      - name: Run Monitor v22
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python monitor.py
      - name: Push trade log
        if: always()
        run: |
          git pull --rebase || true
          git add trade_log.csv || true
          git commit -m "auto: trade log update" || true
          git push || true