name: Event Contract Monitor v25 WS

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests numpy pandas pandas_ta_classic websocket-client
      - name: Test Push Only
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python test_push.py
