name: 事件合约监控

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests numpy pandas pandas_ta_classic
      - name: Configure Git
        run: |
          git config user.name "EventMonitor"
          git config user.email "monitor@bot.com"
      - name: Run Monitor
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          TEST_MODE: ${{ secrets.TEST_MODE }}
        run: python monitor.py
